<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- 비공개일 땐 제목/설명에 개인 정보(이름·이력서명) 노출 안 함 -->
	{% if site.public %}{% assign meta_title = site.title %}{% assign meta_desc = site.desc %}{% else %}{% assign meta_title = "비공개" %}{% assign meta_desc = "" %}{% endif %}
	<title>{{ meta_title }}</title>

	<!-- 저장된 테마를 렌더 전에 적용 (다크 모드 깜빡임 방지) -->
	<script>
		(function () {
			try {
				if (localStorage.getItem("theme") === "dark") {
					document.documentElement.classList.add("dark");
				}
			} catch (e) {}
		})();
	</script>

	<!-- robots.txt 수집 불가-->
	<meta name="robots" content="noindex, nofollow" />

	<!-- 일반적인 링크 공유 카드 디자인-->
	<meta property="og:type" content="profile">
	<meta property="og:url" content="{{ site.baseurl }}">
	<meta property="og:title" content="{{ meta_title }}">
	<meta property="og:description" content="{{ meta_desc }}">
	<meta property="og:image" content="{{ site.thumbnail | relative_url }}">
	<meta property="og:site_name" content="{{ meta_title }}">

	<!-- Twitter 링크 공유 카드 디자인 -->
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="{{ meta_title }}">
	<meta name="twitter:description" content="{{ meta_desc }}">
	<meta name="twitter:image" content="{{ site.thumbnail | relative_url }}">

	<!-- Java Scripts 등록 -->
	<script src="{{ "/assets/js/localhostChecker.js" | relative_url }}"></script>
	<script src="{{ "/assets/js/experienceCalculator.js" | relative_url }}"></script>
	<script src="{{ "/assets/js/postLoader.js" | relative_url }}"></script>
	<script src="{{ "/assets/js/gallery.js" | relative_url }}"></script>
	<script src="{{ "/assets/js/videoFallback.js" | relative_url }}"></script>
	<script src="{{ "/assets/js/formatDate.js" | relative_url }}"></script>
	<script src="{{ "/assets/js/toast.js" | relative_url }}"></script>
	<script src="{{ "/assets/js/textActions.js" | relative_url }}"></script>
	<script src="{{ "/assets/js/imageModal.js" | relative_url }}"></script>

	<!-- CSS 등록 -->
	<link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">

	<!-- Font 등록 -->
	<link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/font/font.css">

	<!-- Favicon (비공개일 땐 표시 안 함) -->
	{% if site.public %}
	<link rel="icon" type="image/png" sizes="16x16" href="{{ "/assets/img/common/favicon.ico" | relative_url }}">
	{% else %}
	<link rel="icon" href="data:,">
	{% endif %}

	<!-- 콘솔 이스터에그 (개발자 도구를 여는 분들에게) -->
	<script>
		(function () {
			var art = [
				"  _   _ _____ _     _      ___  ",
				" | | | | ____| |   | |    / _ \\ ",
				" | |_| |  _| | |   | |   | | | |",
				" |  _  | |___| |___| |___| |_| |",
				" |_| |_|_____|_____|_____|\\___/ "
			].join("\n");

			console.log("%c" + art, "color:#f5821f;font-family:monospace;font-size:13px;line-height:1.2;");
			console.log("%cI'm {{ site.author.name_en }} ({{ site.author.name_ko }}), a Game Client Developer.\n소스까지 봐주셔서 감사합니다 :) 채용 제안은 언제든 환영합니다 📩", "font-size:13px;color:#888;");
			console.log("%c{{ site.author.email }}", "font-size:13px;color:#888;");
		})();
	</script>
</head>
