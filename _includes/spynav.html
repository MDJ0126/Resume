<nav class="spy-nav">
    <ul>
        <li><a href="#top" class="nav-link active"><span class="nav-text">클라이언트 문동준</span><span class="nav-dot"></span></a></li>
        <li><a href="#about" class="nav-link"><span class="nav-text">정보</span><span class="nav-dot"></span></a></li>
        <li><a href="#companys" class="nav-link"><span class="nav-text">경력</span><span class="nav-dot"></span></a></li>
        <li><a href="#projects" class="nav-link"><span class="nav-text">프로젝트</span><span class="nav-dot"></span></a></li>
        <li><a href="#skills" class="nav-link"><span class="nav-text">보유 기술</span><span class="nav-dot"></span></a></li>
        <li><a href="#education" class="nav-link"><span class="nav-text">학력·자격</span><span class="nav-dot"></span></a></li>
    </ul>
</nav>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const navLinks = document.querySelectorAll(".nav-link");
        const sections = document.querySelectorAll("section");

        let isClicked = false;

        const options = {
            root: null,
            // 상단 판정 범위를 -5% 정도로 살짝 낮추고, 하단을 넓혀서 스크롤 시 더 잘 걸리게 수정
            rootMargin: "-5% 0px -60% 0px",
            threshold: 0
        };

        // 공통 기능: 특정 ID를 가진 탭만 활성화하는 함수
        const activateTab = (targetId) => {
            navLinks.forEach((link) => {
                link.classList.remove("active");
                if (link.getAttribute("href") === `#${targetId}`) {
                    link.classList.add("active");
                }
            });
        };

        // 마지막 네비 항목 활성화 / 페이지 맨 아래 판정
        const activateLast = () => {
            if (navLinks.length === 0) return;
            const lastHref = navLinks[navLinks.length - 1].getAttribute("href");
            activateTab(lastHref.replace("#", ""));
        };
        const atBottom = () =>
            (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 2);

        const observer = new IntersectionObserver((entries) => {
            if (isClicked) return;

            // 💡 [추가 안전장치] 스크롤이 완전히 맨 위(0)에 도달했다면 
            // 아래 Observer 판정을 무시하고 무조건 첫 번째 섹션 탭을 켭니다.
            if (window.scrollY === 0 && sections.length > 0) {
                activateTab(sections[0].getAttribute("id"));
                return;
            }

            // 맨 아래에 도달하면 마지막 항목을 활성화 (마지막 섹션이 관찰 범위에 안 걸리는 문제 보정)
            if (atBottom()) {
                activateLast();
                return;
            }

            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    const id = entry.target.getAttribute("id");
                    activateTab(id);
                }
            });
        }, options);

        sections.forEach((section) => observer.observe(section));

        // 💡 [추가] 사용자가 마우스 휠로 맨 위까지 스크롤 했을 때를 위한 이벤트 리스너
        window.addEventListener("scroll", () => {
            if (isClicked) return;

            if (window.scrollY === 0 && sections.length > 0) {
                activateTab(sections[0].getAttribute("id"));
                return;
            }

            if (atBottom()) {
                activateLast();
            }
        });

        // 탭 버튼 클릭 이벤트
        navLinks.forEach((link) => {
            link.addEventListener("click", (e) => {
                const targetId = link.getAttribute("href");

                // 다른 페이지로 향하는 링크(앵커가 아닌 경우)는 기본 이동 허용
                if (!targetId.startsWith("#")) {
                    return;
                }

                e.preventDefault();
                const targetSection = document.querySelector(targetId);

                if (targetSection) {
                    isClicked = true;

                    navLinks.forEach((l) => l.classList.remove("active"));
                    link.classList.add("active");

                    // 1. 목표 위치 계산 (scroll-margin-top 값 반영)
                    // SCSS에서 설정한 scroll-margin-top 값이 있다면 그만큼 빼주어야 정확히 멈춥니다.
                    const scrollMarginTop = 80;
                    const targetPosition = window.pageYOffset + targetSection.getBoundingClientRect().top - scrollMarginTop;
                    const startPosition = window.pageYOffset;
                    const distance = targetPosition - startPosition;

                    // 2. ⏱️ 스크롤 총 소요 시간 설정 (원하는 속도로 조절하세요!)
                    // 1000 = 1초, 400 = 0.4초 (숫자가 작을수록 빨라집니다)
                    const duration = 200;
                    let startTime = null;

                    // 3. 부드러운 움직임을 위한 감속(Easing) 함수 (Cubic-InOut 효과)
                    const easeInOutCubic = (t, b, c, d) => {
                        t /= d / 2;
                        if (t < 1) return (c / 2) * t * t * t + b;
                        t -= 2;
                        return (c / 2) * (t * t * t + 2) + b;
                    };

                    // 4. 프레임별 스크롤 애니메이션 진행
                    const animation = (currentTime) => {
                        if (startTime === null) startTime = currentTime;
                        const timeElapsed = currentTime - startTime;

                        // 이징 함수를 거쳐 계산된 현재 프레임의 Y축 위치
                        const run = easeInOutCubic(timeElapsed, startPosition, distance, duration);
                        window.scrollTo(0, run);

                        if (timeElapsed < duration) {
                            requestAnimationFrame(animation); // 다음 프레임 요청
                        } else {
                            // 애니메이션이 완전히 끝난 후 처리
                            window.scrollTo(0, targetPosition);

                            // 💡 애니메이션 시간(duration)보다 100ms 정도 여유를 두고 플래그를 해제합니다.
                            setTimeout(() => {
                                isClicked = false;
                            }, 100);
                        }
                    };

                    // 애니메이션 시작
                    requestAnimationFrame(animation);
                }
            });
        });
    });
</script>
