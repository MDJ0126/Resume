<div id="projectModal" class="project-modal-root">
    <button class="project-modal-close" type="button" aria-label="닫기">&times;</button>
    <div class="project-modal-body" id="projectModalBody"></div>
</div>

<script>
    (function () {
        const modal = document.getElementById("projectModal");
        const body = document.getElementById("projectModalBody");
        const closeBtn = modal ? modal.querySelector(".project-modal-close") : null;
        if (!modal || !body) return;

        let savedScrollY = 0;

        function openModal(url) {
            body.innerHTML = "";
            loadPost(url, "projectModalBody");
            modal.classList.add("open");
            modal.scrollTop = 0;

            // 스크롤 잠금 (body 고정)
            savedScrollY = window.scrollY || window.pageYOffset || 0;
            const scrollBarWidth = window.innerWidth - document.documentElement.clientWidth;
            document.body.style.position = "fixed";
            document.body.style.top = `-${savedScrollY}px`;
            document.body.style.left = "0";
            document.body.style.right = "0";
            document.body.style.width = "100%";
            document.body.style.overflow = "hidden";
            if (scrollBarWidth > 0) document.body.style.paddingRight = `${scrollBarWidth}px`;
        }

        function closeModal() {
            modal.classList.remove("open");
            body.innerHTML = ""; // 재생 중인 영상 정지 등 정리

            // 스크롤 잠금 해제 후 원래 위치로 복원
            document.body.style.position = "";
            document.body.style.top = "";
            document.body.style.left = "";
            document.body.style.right = "";
            document.body.style.width = "";
            document.body.style.overflow = "";
            document.body.style.paddingRight = "";
            window.scrollTo(0, savedScrollY);
        }

        // 프로젝트 항목 클릭 시 모달 오픈
        document.addEventListener("click", (e) => {
            const item = e.target.closest(".project-item");
            if (item && item.dataset.postUrl) {
                openModal(item.dataset.postUrl);
            }
        });

        // 닫기: X 버튼 / 카드 바깥(배경) 클릭
        if (closeBtn) closeBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
        });

        // ESC로 닫기
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && modal.classList.contains("open")) closeModal();
        });
    })();
</script>
