<button id="download-pdf-btn" class="fab pdf-btn" type="button" aria-label="PDF로 저장 또는 인쇄">
    <span class="fab-label">PDF / 인쇄</span>
    <span class="fab-icon">📄</span>
</button>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const pdfBtn = document.getElementById("download-pdf-btn");

        if (pdfBtn) {
            pdfBtn.addEventListener("click", () => {
                // 브라우저 자체 인쇄 창 실행 (여기서 PDF로 저장 가능)
                window.print();
            });
        }
    });
</script>
