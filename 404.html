<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/font/font.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
    <style>
        body {
            margin: 0;
        }

        .notfound {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Noto Sans KR', sans-serif;
            padding: 24px;
            color: #555;
        }

        .notfound .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .notfound h1 {
            margin: 0 0 10px;
            font-size: 1.6em;
            color: #333;
        }

        .notfound p {
            margin: 0;
            color: #888;
        }

        .notfound a {
            display: inline-block;
            padding: 11px 22px;
            border-radius: 22px;
            background-color: #f5821f;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .notfound a:hover {
            background-color: #d96f12;
        }
    </style>
</head>
<body>
    <div class="notfound">
        <div>
            <div class="icon">🔍</div>
            <h1>404 · 페이지를 찾을 수 없습니다</h1>
            <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
        </div>
    </div>
</body>
</html>
